# =============================================================================
# Ansible Static Inventory
# =============================================================================
# Usage:
#   ansible -i inventory/hosts.ini all -m ping
#   ansible-playbook -i inventory/hosts.ini playbook_patch_os.yml
#
# Syntax:
#   <alias> ansible_host=<IP> ansible_user=<USER> ansible_port=<PORT>
#
# Variables set at group level apply to all hosts in that group.
# Variables set at host level override group-level variables.
# =============================================================================


# -----------------------------------------------------------------------------
# Web Servers
# -----------------------------------------------------------------------------
[webservers]
web01 ansible_host=192.168.1.10 ansible_user=ubuntu
web02 ansible_host=192.168.1.11 ansible_user=ubuntu
web03 ansible_host=192.168.1.12 ansible_user=ubuntu

[webservers:vars]
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_python_interpreter=/usr/bin/python3


# -----------------------------------------------------------------------------
# Application Servers
# -----------------------------------------------------------------------------
[appservers]
app01 ansible_host=192.168.1.20 ansible_user=ec2-user
app02 ansible_host=192.168.1.21 ansible_user=ec2-user

[appservers:vars]
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_python_interpreter=/usr/bin/python3


# -----------------------------------------------------------------------------
# Database Servers
# -----------------------------------------------------------------------------
[dbservers]
db01 ansible_host=192.168.1.30 ansible_user=ubuntu ansible_port=22
db02 ansible_host=192.168.1.31 ansible_user=ubuntu ansible_port=22

[dbservers:vars]
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_python_interpreter=/usr/bin/python3


# -----------------------------------------------------------------------------
# Monitoring Servers
# -----------------------------------------------------------------------------
[monitoring]
mon01 ansible_host=192.168.1.40 ansible_user=ubuntu

[monitoring:vars]
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_python_interpreter=/usr/bin/python3


# -----------------------------------------------------------------------------
# Environment Groups
# -----------------------------------------------------------------------------

# All staging hosts
[staging:children]
webservers
appservers

[staging:vars]
env=staging

# All production hosts
[production:children]
webservers
appservers
dbservers
monitoring

[production:vars]
env=production


# -----------------------------------------------------------------------------
# All hosts — global defaults
# -----------------------------------------------------------------------------
[all:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ConnectTimeout=10'
