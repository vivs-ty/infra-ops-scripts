name: Ansible Lint

on:
  push:
    branches:
      - main
    paths:
      - '*.yml'
      - 'inventory/**'
  pull_request:
    branches:
      - main
    paths:
      - '*.yml'
      - 'inventory/**'

jobs:
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ansible-lint
        run: |
          pip install --upgrade pip
          pip install ansible-lint==24.2.3 ansible-core==2.17.9

      - name: Run ansible-lint on all playbooks
        id: lint
        run: |
          PLAYBOOKS=$(find . -maxdepth 1 \( -name "playbook_*.yml" -o -name "service_status.yml" \) | sort | tr '\n' ' ')
          if [ -z "$PLAYBOOKS" ]; then
            echo "No playbooks found to lint."
            exit 0
          fi
          echo "Linting: $PLAYBOOKS"
          # shellcheck disable=SC2086
          ansible-lint $PLAYBOOKS 2>&1 | tee lint_output.txt
        continue-on-error: true

      - name: Post lint results as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          COMMIT_SHA: ${{ github.sha }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let lintOutput = '(lint output not available)';
            try {
              lintOutput = fs.readFileSync('lint_output.txt', 'utf8');
            } catch (e) {
              console.log('lint_output.txt not found:', e.message);
            }
            const truncated = lintOutput.length > 60000
              ? lintOutput.substring(0, 60000) + '\n...(truncated)'
              : lintOutput;

            const status = process.env.LINT_OUTCOME === 'success'
              ? '\u2705 All checks passed'
              : '\u274c Lint issues found';

            const body =
              '## Ansible Lint Results \u2014 ' + status + '\n\n' +
              '<details><summary>Show Full Output</summary>\n\n' +
              '```\n' + truncated + '\n```\n\n' +
              '</details>\n\n' +
              '> Lint run on commit `' + process.env.COMMIT_SHA + '`';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Upload lint output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ansible-lint-results
          path: lint_output.txt

      - name: Fail if lint found issues
        if: steps.lint.outcome == 'failure'
        run: exit 1
