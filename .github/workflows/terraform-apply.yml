name: Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'

  workflow_dispatch:
    inputs:
      terraform_path:
        description: 'Path to Terraform configuration'
        required: true
        default: 'terraform'
      force_unlock_id:
        description: 'Terraform state lock ID to force-unlock before apply (leave blank to skip)'
        required: false
        default: ''

concurrency:
  group: terraform-apply-${{ github.ref }}
  cancel-in-progress: false  # Never cancel an in-flight apply; queue instead

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest

    # environment: production     Requires manual approval in GitHub Environments

    env:
      TF_INPUT: false
      TF_IN_AUTOMATION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Set Terraform path
        run: |
          if [ -z "${{ github.event.inputs.terraform_path }}" ]; then
            echo "TERRAFORM_PATH=terraform" >> $GITHUB_ENV
          else
            echo "TERRAFORM_PATH=${{ github.event.inputs.terraform_path }}" >> $GITHUB_ENV
          fi

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: ${{ env.TERRAFORM_PATH }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TERRAFORM_PATH }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.TERRAFORM_PATH }}

      - name: Force-unlock Terraform state
        if: github.event.inputs.force_unlock_id != ''
        run: |
          echo "Force-unlocking state with lock ID: ${{ github.event.inputs.force_unlock_id }}"
          terraform force-unlock -force "${{ github.event.inputs.force_unlock_id }}"
        working-directory: ${{ env.TERRAFORM_PATH }}

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        working-directory: ${{ env.TERRAFORM_PATH }}

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve tfplan 2>&1 | tee apply_output.txt
        working-directory: ${{ env.TERRAFORM_PATH }}

      - name: Post Apply summary
        if: always()
        uses: actions/github-script@v7
        env:
          TF_PATH: ${{ env.TERRAFORM_PATH }}
          APPLY_OUTCOME: ${{ steps.apply.outcome }}
          COMMIT_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let applyOutput = '';
            try {
              applyOutput = fs.readFileSync(process.env.TF_PATH + '/apply_output.txt', 'utf8');
            } catch (e) {
              applyOutput = 'Apply output not available.';
            }
            const truncated = applyOutput.length > 60000
              ? applyOutput.substring(0, 60000) + '\n...(truncated)'
              : applyOutput;

            const status = process.env.APPLY_OUTCOME === 'success' ? '✅ SUCCESS' : '❌ FAILED';
            await core.summary
              .addHeading('Terraform Apply — ' + status)
              .addRaw('**Commit:** `' + process.env.COMMIT_SHA + '`\n\n')
              .addRaw('**Branch:** `' + process.env.REF_NAME + '`\n\n')
              .addDetails('Apply Output', '```hcl\n' + truncated + '\n```')
              .write();

      - name: Fail if apply failed
        if: steps.apply.outcome == 'failure'
        run: exit 1
