name: Terraform Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '*.sh'

  workflow_dispatch:
    inputs:
      terraform_path:
        description: 'Path to the Terraform configuration directory'
        required: false
        default: 'terraform'

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    env:
      TF_INPUT: false
      TF_IN_AUTOMATION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Resolve Terraform path
        run: |
          if [ -z "${{ github.event.inputs.terraform_path }}" ]; then
            echo "TERRAFORM_PATH=terraform" >> $GITHUB_ENV
          else
            echo "TERRAFORM_PATH=${{ github.event.inputs.terraform_path }}" >> $GITHUB_ENV
          fi

      - name: Validate Terraform path exists
        run: |
          if [ ! -d "${{ env.TERRAFORM_PATH }}" ]; then
            echo "ERROR: Terraform path '${{ env.TERRAFORM_PATH }}' does not exist in this repository."
            exit 1
          fi

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        working-directory: ${{ env.TERRAFORM_PATH }}
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init
        working-directory: ${{ env.TERRAFORM_PATH }}

      - name: Terraform Validate
        id: validate
        run: terraform validate
        working-directory: ${{ env.TERRAFORM_PATH }}

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
        working-directory: ${{ env.TERRAFORM_PATH }}
        continue-on-error: true

      - name: Post Plan output as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          TF_PATH: ${{ env.TERRAFORM_PATH }}
          COMMIT_SHA: ${{ github.sha }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let planOutput = '(plan output not available)';
            try {
              planOutput = fs.readFileSync('${{ env.TERRAFORM_PATH }}/plan_output.txt', 'utf8');
            } catch (e) {
              console.log('plan_output.txt not found:', e.message);
            }
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n...(truncated)'
              : planOutput;

            const fmtStatus    = '${{ steps.fmt.outcome }}'    === 'success' ? '✅ Pass' : '❌ Fail';
            const initStatus   = '${{ steps.init.outcome }}'   === 'success' ? '✅ Pass' : '❌ Fail';
            const validateStatus = '${{ steps.validate.outcome }}' === 'success' ? '✅ Pass' : '❌ Fail';
            const planStatus   = '${{ steps.plan.outcome }}'   === 'success' ? '✅ Pass' : '❌ Fail';

            const table =
              '| Step     | Status |\n' +
              '|----------|--------|\n' +
              `| Format   | ${fmtStatus} |\n` +
              `| Init     | ${initStatus} |\n` +
              `| Validate | ${validateStatus} |\n` +
              `| Plan     | ${planStatus} |`;

            const tfPath = process.env.TF_PATH || 'terraform';
            const sha    = process.env.COMMIT_SHA || '';

            const body =
              '## Terraform Plan Results\n\n' +
              table + '\n\n' +
              '<details><summary>Show Plan Output</summary>\n\n' +
              '```hcl\n' + truncated + '\n```\n\n' +
              '</details>\n\n' +
              `> Path: \`${tfPath}\` — commit \`${sha}\``;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Upload plan output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-output
          path: ${{ env.TERRAFORM_PATH }}/plan_output.txt
          if-no-files-found: ignore

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
