---
- name: User Management
  hosts: all
  become: true

  vars:
    # -------------------------------------------------------------------
    # Define users to create or ensure exist
    # state: present = create, absent = delete
    # groups: additional groups to add the user to (optional)
    # shell: login shell (default /bin/bash)
    # sudo: true = grant passwordless sudo access
    # ssh_key: public SSH key to authorize for the user (optional)
    # -------------------------------------------------------------------
    users:
      - name: deploy
        state: present
        groups:
          - docker
        shell: /bin/bash
        sudo: true
        ssh_key: "ssh-ed25519 AAAAC3Nza... deploy@example.com"  # Replace with real key

      - name: auditor
        state: present
        groups: []
        shell: /bin/bash
        sudo: false
        ssh_key: ""

      - name: olduser
        state: absent

  tasks:

    # -----------------------------------------------------------------------
    # Create / update users
    # -----------------------------------------------------------------------

    - name: Create or update user accounts
      user:
        name: "{{ item.name }}"
        state: "{{ item.state }}"
        shell: "{{ item.shell | default('/bin/bash') }}"
        groups: "{{ item.groups | default([]) }}"
        append: true
        create_home: true
        remove: "{{ item.state == 'absent' }}"
        force: "{{ item.state == 'absent' }}"
      loop: "{{ users }}"
      loop_control:
        label: "{{ item.name }}"

    # -----------------------------------------------------------------------
    # Manage SSH authorized keys
    # -----------------------------------------------------------------------

    - name: Add authorized SSH key
      authorized_key:
        user: "{{ item.name }}"
        state: present
        key: "{{ item.ssh_key }}"
      loop: "{{ users }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - item.state == 'present'
        - item.ssh_key is defined
        - item.ssh_key | length > 0

    # -----------------------------------------------------------------------
    # Sudo access
    # -----------------------------------------------------------------------

    - name: Grant passwordless sudo access
      copy:
        dest: "/etc/sudoers.d/{{ item.name }}"
        content: "{{ item.name }} ALL=(ALL) NOPASSWD:ALL\n"
        owner: root
        group: root
        mode: "0440"
        validate: "visudo -cf %s"
      loop: "{{ users }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - item.state == 'present'
        - item.sudo | default(false)

    - name: Remove sudo access for deleted or non-sudo users
      file:
        path: "/etc/sudoers.d/{{ item.name }}"
        state: absent
      loop: "{{ users }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - item.state == 'absent' or not (item.sudo | default(false))

    # -----------------------------------------------------------------------
    # Report
    # -----------------------------------------------------------------------

    - name: Report user management result
      debug:
        msg: >
          User '{{ item.name }}': {{ item.state }},
          sudo={{ item.sudo | default(false) }},
          ssh_key={{ 'configured' if (item.ssh_key | default('')) | length > 0 else 'not set' }}
      loop: "{{ users }}"
      loop_control:
        label: "{{ item.name }}"
      when: item.state == 'present'
