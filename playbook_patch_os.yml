---
- name: Patch and Reboot Linux Hosts
  hosts: all
  become: true
  serial: 1  # Patch one host at a time to avoid simultaneous reboots

  vars:
    reboot_required: false
    reboot_timeout: 300  # Seconds to wait for host to come back after reboot
    lxd_snapshot_enabled: false   # Set to true to take a pre-patch LXD snapshot for rollback
    lxd_snapshot_retain: 5        # Number of pre-patch snapshots to keep per container

  pre_tasks:

    # -----------------------------------------------------------------------
    # Optional: LXD pre-patch snapshot (runs on the Ansible controller)
    # Restore with: lxc restore <container> <snapshot_name>
    # -----------------------------------------------------------------------

    - name: Take pre-patch LXD snapshot for rollback
      command: >
        lxc snapshot {{ inventory_hostname }}
        pre_patch_{{ ansible_date_time.epoch }}
      delegate_to: localhost
      become: false
      when: lxd_snapshot_enabled | bool
      register: lxd_snapshot_result
      changed_when: lxd_snapshot_result.rc == 0

    - name: Prune old pre-patch snapshots (keep last {{ lxd_snapshot_retain }})
      shell: |
        lxc info {{ inventory_hostname }} \
          | awk '/^Snapshots:/,0' \
          | grep 'pre_patch_' \
          | awk '{print $1}' \
          | sort \
          | head -n -{{ lxd_snapshot_retain }} \
          | xargs -r -I{} lxc delete {{ inventory_hostname }}/{}
      delegate_to: localhost
      become: false
      when: lxd_snapshot_enabled | bool
      changed_when: false

  tasks:

    # -----------------------------------------------------------------------
    # Debian / Ubuntu
    # -----------------------------------------------------------------------

    - name: Update apt cache (Debian/Ubuntu)
      apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == 'Debian'

    - name: Apply all available upgrades (Debian/Ubuntu)
      apt:
        upgrade: dist
        autoremove: true
        autoclean: true
      register: apt_upgrade_result
      when: ansible_os_family == 'Debian'

    - name: Check if reboot is required (Debian/Ubuntu)
      stat:
        path: /var/run/reboot-required
      register: reboot_required_file
      when: ansible_os_family == 'Debian'

    - name: Set reboot flag (Debian/Ubuntu)
      set_fact:
        reboot_required: true
      when:
        - ansible_os_family == 'Debian'
        - reboot_required_file.stat.exists

    # -----------------------------------------------------------------------
    # RHEL / CentOS / Amazon Linux
    # -----------------------------------------------------------------------

    - name: Apply all available updates (RHEL/CentOS)
      yum:
        name: "*"
        state: latest
        update_cache: true
      register: yum_update_result
      when: ansible_os_family == 'RedHat'

    - name: Check if reboot is required (RHEL/CentOS)
      command: needs-restarting -r
      register: needs_restarting_result
      failed_when: false
      changed_when: false
      when: ansible_os_family == 'RedHat'

    - name: Set reboot flag (RHEL/CentOS)
      set_fact:
        reboot_required: true
      when:
        - ansible_os_family == 'RedHat'
        - needs_restarting_result.rc == 1

    # -----------------------------------------------------------------------
    # Reboot if required
    # -----------------------------------------------------------------------

    - name: Reboot host if required
      reboot:
        msg: "Reboot triggered by Ansible patching playbook"
        reboot_timeout: "{{ reboot_timeout }}"
        test_command: uptime
      when: reboot_required

    # -----------------------------------------------------------------------
    # Report
    # -----------------------------------------------------------------------

    - name: Report patch status (Debian/Ubuntu)
      debug:
        msg: >
          {{ inventory_hostname }} — packages upgraded:
          {{ apt_upgrade_result.stdout | default('N/A') }},
          reboot was {{ 'required' if reboot_required else 'not required' }}.
      when: ansible_os_family == 'Debian'

    - name: Report patch status (RHEL/CentOS)
      debug:
        msg: >
          {{ inventory_hostname }} — updates applied:
          {{ yum_update_result.changes | default({}) | to_nice_json }},
          reboot was {{ 'required' if reboot_required else 'not required' }}.
      when: ansible_os_family == 'RedHat'
